<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ridiculous Excuse Generator</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: "Comic Sans MS", "Trebuchet MS", sans-serif;
            background: #676767;
            color: #ffffff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .card {
            background: #2a1a52;
            border: 4px solid #ffd23f;
            border-radius: 20px;
            padding: 40px;
            max-width: 560px;
            width: 100%;
            text-align: center;
            box-shadow: 0 12px 0 #120a24;
        }

        h1 {
            font-size: 38px;
            color: #ffd23f;
            margin-bottom: 8px;
        }

        .subtitle {
            font-size: 16px;
            color: #c5b6f0;
            margin-bottom: 28px;
        }

        .categories {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: center;
            margin-bottom: 28px;
        }

        .category-btn {
            font-family: inherit;
            font-size: 15px;
            padding: 10px 18px;
            border: 3px solid #6b4fd6;
            background: #1b1033;
            color: #ffffff;
            border-radius: 30px;
            cursor: pointer;
        }

        .category-btn:hover {
            background: #6b4fd6;
        }

        .category-btn.active {
            background: #ff5d8f;
            border-color: #ff5d8f;
        }

        .excuse-box {
            background: #676767;
            border: 3px dashed #6b4fd6;
            border-radius: 16px;
            padding: 30px 20px;
            min-height: 120px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            line-height: 1.4;
            margin-bottom: 28px;
        }

        .generate-btn {
            font-family: inherit;
            font-size: 22px;
            font-weight: bold;
            padding: 16ps 40px;
            border: none;
            background: #ffd23f;
            color: #676767;
            border-radius: 14px;
            cursor: poitner;
            box-shadow: 0 6px 0 #c9a312;
        }

        .generate-btn:hover {
            background: #ffe16b;
        }

        .generate-btn:active {
            transform: trnaslateY(4px);
            box-shadow: 0 2px 0 #c9a312;
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>Ridiculous Excuse Generator</h1>
        <p class="subtitle">Pick a reason to bail and hit the button.</p>

        <div class="categories">
            <button class="category-btn active" data-category="work">Work</button>
            <button class="category-btn" data-category="school">School</button>
            <button class="category-btn" data-category="homework">Homework</button>
        </div>

        <div class="excuse-box" id="excuseBox">Your excuse will appear here...</div>

        <button class="generate-btn" id="generate-btn">Generate Excuse</button>
    </div>

    <script>
        var excuses = {
            work: [
                "My alarm clock joined a union and went on strike this morning.",
                "A family of raccoons has occupied my car and refuses to negotiate.",
                "I accidentally superglued myself to my office chair at home.",
                "My Wi-Fi router needs emotional support and I can't leave its side.",
                "I'm stuck in a staring contest with my cat and I refuse to lose.",
                "My houseplant is sick and I'm the only one it trusts.",
                "A squirrel stole my car keys.",
                "The stop sign told me to stop.",
                "My vacuum cleaner ate my sock.",
                "There was a family of ants crossing the road."
            ],
            school: [
                "My dog ate my shoes.",
                "I was abducted by my cat.",
                "My little brother ate my backpack.",
                "My brother hid my backpack inside the dishwasher",
                "There was a family of ants crossing the road.",
                "I spent an hour looking for my glasses before realizing they had been on my face the entire time.",
                "I accidentlaly got on the wrong bus.",
                "My little sibling ate all my school supplies.",
                "The stop sign told me to stop.",
                "I realized that I was wearing two different shoes, noticed halfway there, and got a mid-life crisis.",
                "A squirrel stole my lunch."
            ],
            homework: [
                "My printer ate the assignment.",
                "A seagull stole my homework.",
                "My dog ate my homework.",
                "My pencil went on strike.",
                "The monster under my bed stole my calculator.",
                "My computer is leaving me on seen.",
                "I left it in a library book.",
                "I finished the assignment but my computer forced an update.",
                "My printer ran out of ink.",
                "My algebra homework has letters in it for some reason.",
                "I forgot to save the file.",
                "My dog was sitting on my keyboard.",
                "My cloud forgot to save the file.",
                "My dog ate my USB drive.",
                "I accidentally did last week's homework.",
                "Autocorrect replaced all my work."
            ]
        };

        var currentCategory = "work";
        var excuseBox = document.getElementById("excuseBox");
        var generateBtn = document.getElementById("generateBtn");
        var categoryButtons = document.querySelectorAll(".category-btn");

        for (var i=0; i < categoryButtons.length; i++) {
            categoryButtons[i].addEventListener("click", function () {
                for (var j = 0; j < categoryButtons.length; j++) {
                    categoryButtons[j].classList.remove("active");
                }
                this.classList.add("active");
                currentCategory = this.getAttribute("data-category");
            });
        }

        generateBtn.addEventListener("click", function() {
            var list = excuses[currentCategory];
            var randomIndex = Math.floor(Math.random() * list.length);
            excuseBox.textContent = list[randomIndex];
        });
    </script>
</body>
</html>
