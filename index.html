<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ridiculous Excuse Generator</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: "Comic Sans MS", "Trebuchet MS", sans-serif;
            background: #676767;
            color: #ffffff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .card {
            background: #2a1a52;
            border: 4px solid #ffd23f;
            border-radius: 20px;
            padding: 40px;
            max-width: 560px;
            width: 100%;
            text-align: center;
            box-shadow: 0 12px 0 #120a24;
        }

        h1 {
            font-size: 38px;
            color: #ffd23f;
            margin-bottom: 8px;
        }

        .subtitle {
            font-size: 16px;
            color: #c5b6f0;
            margin-bottom: 28px;
        }

        .categories {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: center;
            margin-bottom: 28px;
        }

        .category-btn {
            font-family: inherit;
            font-size: 15px;
            padding: 10px 18px;
            border: 3px solid #6b4fd6;
            background: #1b1033;
            color: #ffffff;
            border-radius: 30px;
            cursor: pointer;
        }

        .category-btn:hover {
            background: #6b4fd6;
        }

        .category-btn.active {
            background: #ff5d8f;
            border-color: #ff5d8f;
        }

        .excuse-box {
            background: #676767;
            border: 3px dashed #6b4fd6;
            border-radius: 16px;
            padding: 30px 20px;
            min-height: 120px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            line-height: 1.4;
            margin-bottom: 28px;
        }

        .generate-btn {
            font-family: inherit;
            font-size: 22px;
            font-weight: bold;
            padding: 16ps 40px;
            border: none;
            background: #ffd23f;
            color: #676767;
            border-radius: 14px;
            cursor: poitner;
            box-shadow: 0 6px 0 #c9a312;
        }

        .generate-btn:hover {
            background: #ffe16b;
        }

        .generate-btn:active {
            transform: trnaslateY(4px);
            box-shadow: 0 2px 0 #c9a312;
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>Ridiculous Excuse Generator</h1>
        <p class="subtitle">Pick a reason to bail and hit the button.</p>

        <div class="categories">
            <button class="category-btn active" data-category="work">Work</button>
            <button class="category-btn" data-category="school">School</button>
            <button class="category-btn" data-category="homework">Homework</button>
        </div>

        <div class="excuse-box" id="excuseBox">Your excuse will appear here...</div>

        <button class="generate-btn" id="generate-btn">Generate Excuse</button>
    </div>

    <script>
        
    </script>
</body>
</html>
